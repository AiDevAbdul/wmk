<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="45%" cy="-5%" r="130%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#132045"/>
      <stop offset="100%" stop-color="#06080F"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#06080F"/>
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Outer gold ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#F5C518" stroke-width="2.5"/>
  <!-- Inner subtle ring -->
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="#F5C518" stroke-width="0.6" opacity="0.3"/>
  <!-- W letterform — proportioned as a bold letter, not a chart -->
  <polyline
    points="10,20 19,48 26.5,25 32,41 37.5,25 45,48 54,20"
    fill="none" stroke="#F5C518" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round"
  />
</svg>
