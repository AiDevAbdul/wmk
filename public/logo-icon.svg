<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="hex-bg" cx="50%" cy="-10%" r="130%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#132045"/>
      <stop offset="100%" stop-color="#06080F"/>
    </radialGradient>
  </defs>
  <!-- Hexagonal badge fill -->
  <polygon points="32,2 58,17 58,47 32,62 6,47 6,17" fill="#06080F"/>
  <polygon points="32,2 58,17 58,47 32,62 6,47 6,17" fill="url(#hex-bg)"/>
  <!-- Gold border -->
  <polygon points="32,2 58,17 58,47 32,62 6,47 6,17" fill="none" stroke="#F5C518" stroke-width="2.5"/>
  <!-- Inner subtle border ring -->
  <polygon points="32,5.5 55.5,19.25 55.5,44.75 32,58.5 8.5,44.75 8.5,19.25" fill="none" stroke="#F5C518" stroke-width="0.6" opacity="0.3"/>
  <!-- W letterform — bold, letter-proportioned -->
  <polyline
    points="10,20 19,48 26.5,25 32,41 37.5,25 45,48 54,20"
    fill="none" stroke="#F5C518" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round"
  />
</svg>
